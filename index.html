<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>遺伝情報翻訳ゲーム（超安全版・モード1）</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
  padding: 10px;
}
button {
  font-size: 16px;
  padding: 8px 12px;
  margin: 4px;
}
.sequence {
  font-size: 18px;
  word-break: break-all;
  margin: 10px 0;
}
</style>
</head>
<body>

<div id="app">
  <h1>遺伝情報翻訳ゲーム</h1>
  <button id="mode1Btn">mRNAから</button>
</div>

<script>
// ===== 遺伝暗号表（RNA）=====
var geneticCode = {
  "AUG":"メチオニン",
  "UUU":"フェニルアラニン","UUC":"フェニルアラニン",
  "UUA":"ロイシン","UUG":"ロイシン",
  "UAA":"終止コドン","UAG":"終止コドン","UGA":"終止コドン"
};

// ===== 変数 =====
var mrna = "";
var correctAA = [];
var userAA = [];
var startTime = 0;
var step = 0;

// ===== DOM =====
var app = document.getElementById("app");

// ===== ユーティリティ =====
function randomBase() {
  var b = ["A","U","G","C"];
  return b[Math.floor(Math.random()4)];
}

function toFullWidth(str) {
  return str.replace(/[A-Z]/g, function(s){
    return String.fromCharCode(s.charCodeAt(0) + 0xFEE0);
  });
}

// ===== 問題生成（モード選択時）=====
function generateMRNA() {
  var dummy = 2 + Math.floor(Math.random()4);
  var seq = "";
  for (var i=0;i<dummy;i++) seq += randomBase();
  seq += "AUG";
  var total = 26 + Math.floor(Math.random()*5);
  while (seq.length < total) seq += randomBase();
  return seq;
}

function translate(seq) {
  var start = seq.indexOf("AUG");
  var result = [];
  for (var i=start;i+2<seq.length;i+=3) {
    var codon = seq.substr(i,3);
    if (geneticCode[codon]) {
      result.push(geneticCode[codon]);
    } else {
      result.push("不明");
    }
  }
  return result;
}

// ===== 画面 =====
document.getElementById("mode1Btn").onclick = function(){
  mrna = generateMRNA();
  correctAA = translate(mrna);
  showDescription();
};

function showDescription() {
  app.innerHTML =
    "<p>mRNAが表示されます。そのmRNAを翻訳したとき、1つ目のアミノ酸から順に選択してアミノ酸配列を作りましょう。<br>" +
    "途中で終止コドンが入った場合は終止コドンを選んでください。<br>" +
    "途中で間違えても最後の解答まで不正解だと表示されません。<br>" +
    "「スタート」のボタンを押してから自分の解答の確定までのタイムが測定されます。</p>" +
    "<button id='startBtn'>スタート</button>";

  document.getElementById("startBtn").onclick = startGame;
}

function startGame() {
  userAA = [];
  step = 0;
  startTime = Date.now();
  showGame();
}

function showGame() {
  var html = "";
  html += "<div class='sequence'>5'-" + toFullWidth(mrna) + "-3'</div>";
  html += "<p>選択中のアミノ酸配列：</p>";
  html += "<p>" + userAA.join("-") + "</p>";
  html += "<p>" + (step+1) + "番目のアミノ酸を選んでください。</p>";

  // 超安全：必ず存在する候補のみ
  var choices = ["メチオニン","フェニルアラニン","ロイシン","終止コドン"];

  for (var i=0;i<choices.length;i++) {
    html += "<button onclick=\"selectAA('" + choices[i] + "')\">" + choices[i] + "</button>";
  }

  html += "<br><br><button onclick='finish()'>解答を確定する</button>";

  app.innerHTML = html;
}

function selectAA(a) {
  userAA.push(a);
  step++;
  showGame();
}

function finish() {
  var ok = true;
  for (var i=0;i<userAA.length;i++) {
    if (userAA[i] !== correctAA[i]) {
      ok = false;
      break;
    }
  }
  var time = (Date.now() - startTime)/1000;
  if (ok) {
    app.innerHTML =
      "<h2>正解！</h2>" +
      "<p>タイム：" + time.toFixed(2) + " 秒</p>" +
      "<button onclick='location.reload()'>最初に戻る</button>";
  } else {
    app.innerHTML =
      "<h2>ざんねん、不正解…</h2>" +
      "<button onclick='location.reload()'>最初に戻る</button>";
  }
}
</script>

</body>
</html>
