<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>遺伝情報翻訳ゲーム</title>
<style>
/* ページ全体の背景を淡い緑に */
body {
  font-family: sans-serif;
  text-align: center;
  background-color: #e8f5e9; /* 薄い緑 */
}

/* 共通ボタンデザイン（緑主体） */
button {
  margin: 5px;
  padding: 8px 14px;
  font-size: 16px;
  background-color: #66bb6a; /* 緑 */
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background-color: #43a047; /* 濃い緑 */
}

/* 配列表示 */
.sequence {
  font-size: 20px;
  margin: 15px;
  font-family: monospace;
  letter-spacing: 0.05em;
}

/* アミノ酸解答表示 */
.answer {
  margin: 10px;
  font-size: 18px;
}

/* 解答確認用アミノ酸表示 */
.confirm-answer {
  font-size: 22px;
  font-weight: bold;      /* 太字 */
  color: #1b5e20;         /* 濃い緑 */
  margin: 15px 0;
}

/* 正解メッセージ */
.correct-text {
    color: #d32f2f;     /* 赤 */
    font-size: 28px;    /* 少し大きく */
    font-weight: bold;
}

/* 不正解メッセージ */
.wrong-text {
    color: #1976d2;     /* 青 */
    font-weight: bold;
}

/* 正解タイム表示用 */
.clear-time {
    font-size: 36px;
    font-weight: bold;
    color: #2e7d32;   /* 濃い緑：達成感 */
    margin-top: 15px;
}

/* 注意書き */
.notice {
  color: #c62828;
  margin-top: 10px;
}

/* 非表示用 */
.hidden {
  display: none;
}
</style>
</head>
<body>

<div id="screen-title">
  <h1>遺伝情報翻訳ゲーム</h1>
  <button onclick="selectMode(1)">mRNAから</button>
  <button onclick="selectMode(2)">遺伝子配列から</button>
  <button onclick="selectMode(3)">鋳型鎖から</button>
  <button onclick="selectMode(4)">2本鎖から</button>
</div>

<div id="screen-desc" class="hidden">
  <!-- 説明文用の枠 -->
  <div
    id="descriptionBox"
    style="
      background-color:#ffffff;
      border-radius:15px;
      padding:20px;
      width:70%;
      margin:20px auto;
      box-shadow:0 2px 5px rgba(0,0,0,0.2);
      text-align:left;
      white-space: pre-line;
    ">mRNAが表示されます。そのmRNAが翻訳されたとき、
1つ目のアミノ酸から順に選択してアミノ酸配列を答えましょう。
途中で終止コドンが入った場合は終止コドンを選んでください。
途中で間違えても最後の解答まで不正解だと表示されません。
スタートのボタンを押してから自分の解答の確定までのタイムが測定されます。
</div>

  <button onclick="startGame()">スタート</button>
</div>

<div id="screen-game" class="hidden">
  <div class="sequence" id="mrna"></div>
  <div id="prompt"></div>
  <div id="choices"></div>
  <div class="answer" id="currentAnswer"></div>
</div>

<div id="screen-check" class="hidden">
  <h2>解答の確認</h2>
  <div class="sequence" id="checkSeq"></div>
  <div class="answer" id="checkAnswer"></div>
  <p>この解答でいいですか？</p>
  <button onclick="judge()">はい</button>
  <button onclick="backToLast()">いいえ</button>
</div>

<div id="screen-result" class="hidden"></div>

<script>
const codonTable = {
  UUU:"フェニルアラニン", UUC:"フェニルアラニン",
  UUA:"ロイシン", UUG:"ロイシン",
  CUU:"ロイシン", CUC:"ロイシン", CUA:"ロイシン", CUG:"ロイシン",
  AUU:"イソロイシン", AUC:"イソロイシン", AUA:"イソロイシン",
  AUG:"メチオニン",
  GUU:"バリン", GUC:"バリン", GUA:"バリン", GUG:"バリン",
  UCU:"セリン", UCC:"セリン", UCA:"セリン", UCG:"セリン",
  AGU:"セリン", AGC:"セリン",
  CCU:"プロリン", CCC:"プロリン", CCA:"プロリン", CCG:"プロリン",
  ACU:"トレオニン", ACC:"トレオニン", ACA:"トレオニン", ACG:"トレオニン",
  GCU:"アラニン", GCC:"アラニン", GCA:"アラニン", GCG:"アラニン",
  UAU:"チロシン", UAC:"チロシン",
  CAU:"ヒスチジン", CAC:"ヒスチジン",
  CAA:"グルタミン", CAG:"グルタミン",
  AAU:"アスパラギン", AAC:"アスパラギン",
  AAA:"リシン", AAG:"リシン",
  GAU:"アスパラギン酸", GAC:"アスパラギン酸",
  GAA:"グルタミン酸", GAG:"グルタミン酸",
  UGU:"システイン", UGC:"システイン",
  UGG:"トリプトファン",
  CGU:"アルギニン", CGC:"アルギニン", CGA:"アルギニン", CGG:"アルギニン",
  AGA:"アルギニン", AGG:"アルギニン",
  GGU:"グリシン", GGC:"グリシン", GGA:"グリシン", GGG:"グリシン",
  UAA:"終止コドン", UAG:"終止コドン", UGA:"終止コドン"
};

// モードごとの説明文
const modeDescriptions = {
  1: `mRNAが表示されます。そのmRNAが翻訳されたとき、
1つ目のアミノ酸から順に選択してアミノ酸配列を答えましょう。
途中で終止コドンが入った場合は終止コドンを選んでください。
途中で間違えても最後の解答まで不正解だと表示されません。
スタートのボタンを押してから自分の解答の確定までのタイムが測定されます。`,

  2: `遺伝子配列(センス鎖)が表示されます。
その遺伝子配列に基づいて翻訳が行われたとき、
1つ目のアミノ酸から順に選択してアミノ酸配列を答えましょう。
途中で終止コドンが入った場合は終止コドンを選んでください。
途中で間違えても最後の解答まで不正解だと表示されません。
スタートのボタンを押してから自分の解答の確定までのタイムが測定されます。`,

  3: `鋳型鎖が表示されます。
この鋳型鎖から作られるmRNAが翻訳されるとき、
1つ目のアミノ酸から順に選択してアミノ酸配列を答えましょう。
途中で終止コドンが入った場合は終止コドンを選んでください。
途中で間違えても最後の解答まで不正解だと表示されません。
スタートのボタンを押してから自分の解答の確定までのタイムが測定されます。`,

  4: `2本鎖DNAが表示されます。
どちらの鎖がセンス鎖かを判断し、そのDNAから作られるmRNAが
翻訳されたとき、1つ目のアミノ酸から順に選択して
アミノ酸配列を答えましょう。
途中で終止コドンが入った場合は終止コドンを選んでください。
途中で間違えても最後の解答まで不正解だと表示されません。
スタートのボタンを押してから自分の解答の確定までのタイムが測定されます。`
};

// 現在のモード（1: mRNA, 2: 遺伝子配列〈非鋳型鎖〉）
let currentMode = 1;

// 表示用配列（mRNA または DNA）
let displaySeq = "";

let mrnaSeq = "";
let codons = [];
let answers = [];
let index = 0;
let startTime = 0;

function selectMode(mode){
    currentMode = mode;
    showDescription(); // 既存の説明画面へ
}

function showDescription(){
  // タイトル画面を隠す
  document.getElementById("screen-title").classList.add("hidden");

  // 説明画面を表示
  document.getElementById("screen-desc").classList.remove("hidden");

  // モードに応じた説明文を表示
  document.getElementById("descriptionBox").innerText =
    modeDescriptions[currentMode];
}

function randomMRNA(){
  const bases = ["A","U","C","G"];
  const stopCodons = ["UAA","UAG","UGA"];

  while(true){
    let dummy = Math.floor(Math.random()*4)+2;
    let total = Math.floor(Math.random()*5)+26;
    let seq = "";

    // ダミー塩基
    for(let i=0;i<dummy;i++){
      seq += bases[Math.floor(Math.random()*4)];
    }

    // 開始コドン
    seq += "AUG";

    // 残りをランダム生成
    while(seq.length < total){
      seq += bases[Math.floor(Math.random()*4)];
    }

    // AUG からコドン分割
    let codons = [];
    for(let i = seq.indexOf("AUG"); i + 2 < seq.length; i += 3){
      codons.push(seq.substring(i, i+3));
    }

    // ★ 最初の5コドンに終止が含まれていないか確認
    let earlyStop = codons.slice(0,5)
      .some(c => stopCodons.includes(c));

    // 含まれていなければ採用
    if(!earlyStop){
      return seq;
    }
    // 含まれていたら while に戻って作り直し
  }
}

// 塩基配列を5塩基ずつスペース区切りにする（表示専用）
function formatBases(seq){
    return seq.match(/.{1,5}/g).join(" ");
}

// モード4用：CAU を含まない mRNA を生成
function randomMRNA_NoCAU(){
  let seq;
  do {
    seq = randomMRNA();
  } while (seq.includes("CAU"));
  return seq;
}

// mRNA から鋳型鎖 DNA を作る関数(モード3専用)
function makeTemplateStrand(mrna){
  // ① U → T（DNA化）
  let dna = mrna.replace(/U/g, "T");

  // ② 相補的な塩基に変換
  let comp = "";
  for (let base of dna) {
    if (base === "A") comp += "T";
    else if (base === "T") comp += "A";
    else if (base === "C") comp += "G";
    else if (base === "G") comp += "C";
  }

  // ③ 並びを逆にして 5'→3' 表示
  return comp.split("").reverse().join("");
}

// DNA 相補鎖を作る（A↔T, C↔G）(モード4専用)
function complementDNA(dna){
  let comp = "";
  for (let b of dna) {
    if (b === "A") comp += "T";
    else if (b === "T") comp += "A";
    else if (b === "C") comp += "G";
    else if (b === "G") comp += "C";
  }
  return comp;
}

function startGame(){
  document.getElementById("screen-desc").classList.add("hidden");
  document.getElementById("screen-game").classList.remove("hidden");

  // ① モードごとの mRNA 生成
  if (currentMode === 4) {
    // CAU を含まない mRNA（モード4のみ）
    mrnaSeq = randomMRNA_NoCAU();
  } else {
    mrnaSeq = randomMRNA();
  }

  // ② 表示用配列の生成
  if (currentMode === 1) {
    // mRNA
    displaySeq = mrnaSeq;

  } else if (currentMode === 2) {
    // センス鎖 DNA
    displaySeq = mrnaSeq.replace(/U/g, "T");

  } else if (currentMode === 3) {
    // 鋳型鎖 DNA
    displaySeq = makeTemplateStrand(mrnaSeq);

  } else if (currentMode === 4) {
    // ==== 二本鎖DNA ====
    // センス鎖 DNA（5'→3'）
    const senseDNA = mrnaSeq.replace(/U/g, "T");

    // 相補鎖 DNA
    const antiDNA = complementDNA(senseDNA);

    // 上段にセンス鎖を置くか下段に置くか（ランダム）
    const senseOnTop = Math.random() < 0.5;

    let topStrand, bottomStrand;

    if (senseOnTop) {
      // 両方そのまま
      topStrand = senseDNA;   // 5'→3'
      bottomStrand = antiDNA; // 3'→5'
    } else {
      // 両方を逆順にする
      topStrand = antiDNA.split("").reverse().join("");
      bottomStrand = senseDNA.split("").reverse().join("");
    }

    // 表示用（上下2行）
    displaySeq =
      "5'- " + formatBases(topStrand) + " -3'\n" +
      "3'- " + formatBases(bottomStrand) + " -5'";
  }

  // ③ 表示（モード4のみ改行表示）
  const seqElem = document.getElementById("mrna");
  if (currentMode === 4) {
    seqElem.style.whiteSpace = "pre-line";
    seqElem.innerText = displaySeq;
  } else {
    seqElem.style.whiteSpace = "normal";
    seqElem.innerText = "5’- " + formatBases(displaySeq) + " -3’";
  }

  // ④ 翻訳用コドン配列は必ず mRNA から
  codons = [];
  for(let i = mrnaSeq.indexOf("AUG"); i + 2 < mrnaSeq.length; i += 3){
    codons.push(mrnaSeq.substring(i, i + 3));
  }

  // ⑤ 状態初期化
  answers = [];
  index = 0;
  updateAnswer();
  startTime = Date.now();

  showChoices();
}

function showChoices(){
  let prompt = document.getElementById("prompt");
  let choices = document.getElementById("choices");
  prompt.innerText = (index+1)+"番目のアミノ酸を選んでください。";
  choices.innerHTML="";
  let correct = codonTable[codons[index]];
  let options = Object.values(codonTable)
    .filter(v=>v!=="終止コドン");
  options = options.sort(()=>0.5-Math.random()).slice(0,3);
  if(!options.includes(correct)) options[0]=correct;
  options = options.sort(()=>0.5-Math.random());
  options.forEach(a=>{
    let b=document.createElement("button");
    b.innerText=a;
    b.onclick=()=>selectAA(a);
    choices.appendChild(b);
  });
  if(index>0){
    let back=document.createElement("button");
    back.innerText="1つ前に戻る";
    back.onclick=()=>{
      answers.pop();
      index--;
      updateAnswer();
      showChoices();
    };
    choices.appendChild(back);
    let reset=document.createElement("button");
    reset.innerText="1番目からやり直す";
    reset.onclick=()=>{
      answers=[];
      index=0;
      updateAnswer();
      startTime=Date.now();
      showChoices();
    };
    choices.appendChild(reset);
  }
  let stop=document.createElement("button");
  stop.innerText="終止コドン";
  stop.onclick=()=>selectAA("終止コドン");
  choices.appendChild(stop);
}

function selectAA(a){
  answers.push(a);
  index++;
  updateAnswer();
  if(a==="終止コドン" || index>=codons.length){
    finish();
  } else {
    showChoices();
  }
}

function updateAnswer(){
  const ansDiv = document.getElementById("currentAnswer");

  // アミノ酸が1つも選ばれていないときは何も表示しない
  if (answers.length === 0) {
      ansDiv.innerText = "";
  } else {
      ansDiv.innerText = answers.join("－") + "－";
  }
}

function finish(){
  // ゲーム画面を隠す
  document.getElementById("screen-game").classList.add("hidden");

  // 確認画面を表示
  document.getElementById("screen-check").classList.remove("hidden");

  // 確認画面：そのモードで表示していた配列を表示
  if (currentMode === 4) {
    document.getElementById("checkSeq").style.whiteSpace = "pre-line";
    document.getElementById("checkSeq").innerText = displaySeq;
  } else {
    document.getElementById("checkSeq").style.whiteSpace = "normal";
    document.getElementById("checkSeq").innerText =
      "5’- " + formatBases(displaySeq) + " -3’";
  }

  // プレイヤーの解答を表示（確認画面用に整形）
  document.getElementById("checkAnswer").innerHTML =
    `<div class="confirm-answer">${formatAnswer(answers)}</div>`;
}

// 確認画面用：最後の「－」を付けない
function formatAnswer(ansArray){
  return ansArray.join("－");
}

function judge(){
  document.getElementById("screen-check").classList.add("hidden");

  let res = document.getElementById("screen-result");
  res.innerHTML = "";
  res.classList.remove("hidden");

  // 正解配列を作る
  let correct=[];
  for(let c of codons){
    let aa = codonTable[c];
    correct.push(aa);
    if(aa==="終止コドン") break;
  }

  let ok = answers.join() === correct.join();

  if(ok){
    let t=(Date.now()-startTime)/1000;
    let m=Math.floor(t/60);
    let s=(t%60).toFixed(2).padStart(5,"0");

    res.innerHTML = `
      <div class="correct-text">正解！</div>
      <div class="clear-time">${m}:${s}</div>`;
  } else {
    res.innerHTML = `
    <div class="wrong-text">ざんねん、不正解…</div>
    <p class="notice">
    ※「はじめからやり直す」「1つ前に戻る」を選んでも
    タイム計測は継続されます。
    </p>`;

    // はじめから
    let retry=document.createElement("button");
    retry.innerText="はじめからやり直す";
    
    // はじめからやり直す
    retry.onclick = () => {
      res.classList.add("hidden");
      document.getElementById("screen-game").classList.remove("hidden");

      // 状態を完全にリセット
      answers = [];
      index = 0;

      // 表示もリセット（空のアミノ酸配列）
      updateAnswer();
      showChoices(); // 「1番目のアミノ酸を選んでください。」
    };
    res.appendChild(retry);

    // 1つ前に戻る
    let back=document.createElement("button");
    back.innerText="1つ前に戻る";
    
    // 1つ前に戻る
    back.onclick = () => {
      res.classList.add("hidden");
      document.getElementById("screen-game").classList.remove("hidden");

      // 直前のアミノ酸を取り消す
      answers.pop();
      index--;

      // 状態に合わせて表示を更新
      updateAnswer(); // 例：メチオニン－バリン－
      showChoices();  // 例：「3番目のアミノ酸を選んでください。」
    };
    res.appendChild(back);
  }

  // モード選択へ
  let btn=document.createElement("button");
  btn.innerText="モード選択画面に戻る";
  btn.onclick=()=>location.reload();
  res.appendChild(btn);
}

function backToLast(){
  // 確認画面を隠す
  document.getElementById("screen-check").classList.add("hidden");

  // 直前の解答を取り消す
  answers.pop();
  index--;

  // ゲーム画面に戻る
  document.getElementById("screen-game").classList.remove("hidden");

  // 表示を更新
  updateAnswer();   // メチオニン－バリン－ まで表示
  showChoices();    // 「3番目のアミノ酸を選んでください。」
}

</script>
</body>
</html>
